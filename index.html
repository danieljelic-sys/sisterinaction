<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Violet Local Chat 🌸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-hover: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --text-primary: rgba(255,255,255,0.9);
            --text-secondary: rgba(255,255,255,0.5);
            --text-muted: rgba(255,255,255,0.3);
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --user-bubble: #7c3aed;
            --bot-bubble: rgba(255,255,255,0.05);
            --success: #34d399;
            --warning: #fbbf24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }

        .sidebar.collapsed { width: 0; overflow: hidden; border: none; }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text h1 {
            font-size: 15px;
            font-weight: 600;
        }

        .logo-text p {
            font-size: 11px;
            color: var(--text-muted);
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 11px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-connected { background: var(--success); box-shadow: 0 0 6px rgba(52,211,153,0.5); }
        .status-disconnected { background: var(--warning); }

        .new-chat-btn {
            margin: 12px 16px;
            padding: 8px 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover { background: var(--accent-hover); }

        .tabs {
            display: flex;
            padding: 0 12px;
            gap: 2px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .tab:hover:not(.active) { color: var(--text-secondary); }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .sidebar-section-title {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 12px 4px 6px;
        }

        .conv-item {
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            margin-bottom: 2px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .conv-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .conv-item.active {
            background: rgba(139,92,246,0.1);
            border-color: rgba(139,92,246,0.2);
            color: var(--text-primary);
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: var(--bg-hover);
        }

        .file-item.selected {
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.2);
        }

        .file-icon { font-size: 14px; }

        .upload-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .settings-group {
            margin-bottom: 16px;
        }

        .settings-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
        }

        .settings-input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
        }

        .settings-input:focus {
            border-color: var(--accent);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        .toggle-switch {
            width: 36px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(16px);
        }

        .action-btn {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .action-btn.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .action-btn.primary:hover {
            background: var(--accent-hover);
        }

        /* ===== MAIN AREA ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .top-bar {
            height: 52px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            background: rgba(17,17,24,0.5);
        }

        .menu-btn {
            padding: 6px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .top-title {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badges {
            display: flex;
            gap: 6px;
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(139,92,246,0.15);
            color: #c4b5fd;
            border: 1px solid rgba(139,92,246,0.2);
        }

        /* ===== MESSAGES ===== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(139,92,246,0.3);
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 400px;
            margin-bottom: 24px;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .suggestion-btn {
            padding: 8px 14px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .message-list {
            max-width: 800px;
            margin: 0 auto;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .avatar.bot {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
        }

        .avatar.user {
            background: rgba(255,255,255,0.08);
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bubble.bot {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-top-left-radius: 4px;
        }

        .bubble.user {
            background: var(--user-bubble);
            color: white;
            border-top-right-radius: 4px;
        }

        .bubble-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.5;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ===== INPUT ===== */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 12px 20px 16px;
            background: rgba(17,17,24,0.5);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .context-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .context-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(139,92,246,0.15);
            color: #c4b5fd;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .input-field {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }

        .input-field:focus {
            border-color: var(--accent);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-hints {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { position: absolute; z-index: 100; height: 100vh; }
            .sidebar.collapsed { width: 0; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🌸</div>
                    <div class="logo-text">
                        <h1>Kimi Local Chat</h1>
                        <p>K2.6 Cloud</p>
                    </div>
                </div>
                <div class="api-status" id="apiStatus">
                    <div class="status-dot status-disconnected"></div>
                    <span style="color: var(--text-muted);">Connecting...</span>
                </div>
            </div>

            <button class="new-chat-btn" onclick="newChat()">
                <span>+</span> New Chat
            </button>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('chat')">💬 Chats</button>
                <button class="tab" onclick="switchTab('files')">📁 Files</button>
                <button class="tab" onclick="switchTab('settings')">⚙️</button>
            </div>

            <div class="sidebar-content" id="sidebarContent">
                <!-- Dynamic content -->
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <div class="top-bar">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="top-title" id="topTitle">New Chat</div>
                <div class="badges" id="badges">
                    <span class="badge" id="personaBadge" style="display:none;">🌸 Persona</span>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">🌸</div>
                    <h2>Kimi Violet Local Chat</h2>
                    <p>Connected to Kimi K2.6 via API. Upload files for context, toggle persona, and start chatting!</p>
                    <div class="suggestions">
                        <button class="suggestion-btn" onclick="setInput('Write an Instagram caption for beagle sisters')">Beagle caption</button>
                        <button class="suggestion-btn" onclick="setInput('Help with coding')">Coding help</button>
                        <button class="suggestion-btn" onclick="setInput('Prevedi na srpski')">Prevedi</button>
                        <button class="suggestion-btn" onclick="setInput('Analyze this text')">Analyze</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="context-tags" id="contextTags"></div>
                    <div class="input-row">
                        <textarea
                            class="input-field"
                            id="inputField"
                            placeholder="Type your message... (Shift+Enter for new line)"
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            ➤
                        </button>
                    </div>
                    <div class="input-hints">
                        <span id="connectionHint">Checking connection...</span>
                        <span>Enter to send · Shift+Enter for new line</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ===== STATE =====
        let messages = [];
        let conversationId = generateId();
        let usePersona = true;
        let selectedFiles = [];
        let uploadedFiles = [];
        let activeTab = 'chat';
        let isLoading = false;
        let sidebarOpen = true;

        const API = '/api';

        // ===== INIT =====
        checkStatus();
        loadFiles();
        renderSidebar();
        setInterval(checkStatus, 30000);

        // ===== API FUNCTIONS =====
        async function checkStatus() {
            try {
                const res = await fetch(`${API}/status`);
                const data = await res.json();
                updateStatus(data);
            } catch (e) {
                updateStatus({ api_configured: false, api_connected: false, api_error: 'Server not running' });
            }
        }

        function updateStatus(data) {
            const dot = data.api_connected
                ? '<div class="status-dot status-connected"></div>'
                : '<div class="status-dot status-disconnected"></div>';
            const text = data.api_connected ? 'Connected' : (data.api_error || 'Not connected');
            const color = data.api_connected ? 'var(--success)' : 'var(--warning)';

            document.getElementById('apiStatus').innerHTML = `${dot}<span style="color:${color}">${text}</span>`;
            document.getElementById('connectionHint').textContent = data.api_connected
                ? `Model: ${data.model} · Connected`
                : 'Server not running — run: python api_server.py';

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = !data.api_connected;
        }

        async function loadFiles() {
            try {
                const res = await fetch(`${API}/files`);
                uploadedFiles = await res.json();
                renderSidebar();
            } catch { /* ignore */ }
        }

        // ===== CHAT =====
        async function sendMessage() {
            const input = document.getElementById('inputField');
            const text = input.value.trim();
            if (!text || isLoading) return;

            addMessage('user', text);
            input.value = '';
            input.style.height = '44px';
            isLoading = true;
            showTyping();

            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        conversation_id: conversationId,
                        use_persona: usePersona,
                        context_files: selectedFiles,
                    }),
                });

                const data = await res.json();
                hideTyping();

                if (data.error) {
                    addMessage('bot', `❌ Error: ${data.error}`);
                } else {
                    addMessage('bot', data.response);
                    conversationId = data.conversation_id;
                }
            } catch (e) {
                hideTyping();
                addMessage('bot', `❌ Connection error. Make sure the server is running (python api_server.py)`);
            }

            isLoading = false;
            updateTopTitle();
        }

        function addMessage(role, content) {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';

            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;

            const avatar = role === 'user'
                ? '<div class="avatar user">👤</div>'
                : '<div class="avatar bot">🤖</div>';

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            msgEl.innerHTML = `
                ${avatar}
                <div class="bubble ${role}">
                    ${escapeHtml(content)}
                    <div class="bubble-time">${time}</div>
                </div>
            `;

            const container = document.getElementById('messages');
            container.appendChild(msgEl);
            container.scrollTop = container.scrollHeight;

            messages.push({ role, content, time });
            updateTopTitle();
            updateBadges();
        }

        function showTyping() {
            const container = document.getElementById('messages');
            const typing = document.createElement('div');
            typing.className = 'message';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="avatar bot">🤖</div>
                <div class="bubble bot">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // ===== UI HELPERS =====
        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', ['chat','files','settings'][i] === tab);
            });
            renderSidebar();
        }

        function renderSidebar() {
            const content = document.getElementById('sidebarContent');

            if (activeTab === 'chat') {
                let html = '<div class="sidebar-section-title">Current Session</div>';
                if (messages.length === 0) {
                    html += '<div style="color:var(--text-muted);font-size:12px;padding:8px;">No messages yet</div>';
                } else {
                    html += `<div class="conv-item active">${escapeHtml(messages[messages.length-1].content.slice(0,40))}...</div>`;
                    html += `<div style="color:var(--text-muted);font-size:10px;padding:4px 8px;">${messages.length} messages</div>`;
                }
                content.innerHTML = html;
            }
            else if (activeTab === 'files') {
                let html = '<div class="sidebar-section-title">Files</div>';
                html += '<button class="upload-btn" onclick="document.getElementById(\'fileInput\').click()">+ Upload File</button>';
                html += '<input type="file" id="fileInput" style="display:none" onchange="handleUpload(event)">';

                uploadedFiles.forEach(f => {
                    const sel = selectedFiles.includes(f.name);
                    html += `<div class="file-item ${sel ? 'selected' : ''}" onclick="toggleFile('${f.name}')">
                        <span class="file-icon">📄</span>
                        <div style="min-width:0;flex:1;">
                            <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(f.name)}</div>
                            <div style="font-size:10px;color:var(--text-muted);">${(f.size/1024).toFixed(1)} KB</div>
                        </div>
                        ${sel ? '<span style="color:var(--accent);font-size:12px;">✓</span>' : ''}
                    </div>`;
                });

                if (selectedFiles.length > 0) {
                    html += `<div style="color:#c4b5fd;font-size:10px;margin-top:8px;">${selectedFiles.length} file(s) as context</div>`;
                }
                content.innerHTML = html;
            }
            else if (activeTab === 'settings') {
                content.innerHTML = `
                    <div class="sidebar-section-title">Settings</div>
                    <div class="settings-group">
                        <label class="settings-label">API Key</label>
                        <input type="password" class="settings-input" id="settingsApiKey" placeholder="sk-...">
                    </div>
                    <div class="settings-group">
                        <label class="settings-label">Model</label>
                        <input type="text" class="settings-input" value="kimi-k2.6" id="settingsModel">
                    </div>
                    <div class="toggle-row">
                        <span style="font-size:12px;color:var(--text-secondary);">🌸 Kimi Violet Persona</span>
                        <div class="toggle-switch ${usePersona ? 'active' : ''}" onclick="togglePersona()"></div>
                    </div>
                    <button class="action-btn primary" onclick="saveSettings()" style="margin-top:12px;">💾 Save Settings</button>
                    <button class="action-btn" onclick="saveChat()">💾 Save Chat</button>
                    <button class="action-btn" onclick="clearChat()" style="color:#f87171;">🗑 Clear Chat</button>
                    <button class="action-btn" onclick="checkStatus()">🔄 Check Connection</button>
                `;
            }
        }

        async function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                await fetch(`${API}/upload`, { method: 'POST', body: formData });
                loadFiles();
            } catch (err) {
                alert('Upload failed');
            }
        }

        function toggleFile(name) {
            if (selectedFiles.includes(name)) {
                selectedFiles = selectedFiles.filter(f => f !== name);
            } else {
                selectedFiles.push(name);
            }
            renderSidebar();
            updateContextTags();
        }

        function togglePersona() {
            usePersona = !usePersona;
            renderSidebar();
            updateBadges();
        }

        async function saveSettings() {
            const apiKey = document.getElementById('settingsApiKey').value;
            const model = document.getElementById('settingsModel').value;
            try {
                await fetch(`${API}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey, model }),
                });
                alert('✅ Settings saved! Restart server to apply API key.');
                checkStatus();
            } catch { alert('Failed to save'); }
        }

        async function saveChat() {
            try {
                const res = await fetch(`${API}/conversations/${conversationId}/save`, { method: 'POST' });
                const data = await res.json();
                if (data.saved) alert(`💾 Saved as ${data.filename}`);
            } catch { alert('Failed to save'); }
        }

        function clearChat() {
            messages = [];
            conversationId = generateId();
            document.getElementById('messages').innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">🌸</div>
                    <h2>Kimi Violet Local Chat</h2>
                    <p>New chat started!</p>
                </div>
            `;
            updateTopTitle();
            updateBadges();
            renderSidebar();
        }

        function newChat() {
            clearChat();
        }

        // ===== UI UPDATES =====
        function updateTopTitle() {
            const title = messages.length === 0
                ? 'New Chat'
                : (messages[messages.length-1].content.slice(0, 50) + '...');
            document.getElementById('topTitle').textContent = title;
        }

        function updateBadges() {
            document.getElementById('personaBadge').style.display = usePersona ? 'inline' : 'none';
        }

        function updateContextTags() {
            const container = document.getElementById('contextTags');
            let html = '';
            if (usePersona) html += '<span class="context-tag">🌸 Kimi Violet persona</span>';
            selectedFiles.forEach(f => {
                html += `<span class="context-tag">📎 ${escapeHtml(f)}</span>`;
            });
            container.innerHTML = html;
        }

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
        }

        // ===== INPUT HANDLING =====
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function setInput(text) {
            document.getElementById('inputField').value = text;
            document.getElementById('inputField').focus();
        }

        // ===== UTILS =====
        function generateId() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
